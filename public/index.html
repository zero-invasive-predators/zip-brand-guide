<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZIP Brand Assets</title>
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar" aria-label="Brand navigation">
      <div class="sidebar-top">
        <div class="sidebar-brand">
          <span class="sidebar-logo">ZIP</span>
          <span class="sidebar-title">Brand Assets</span>
        </div>
        <button type="button" class="sidebar-close" id="sidebar-close" aria-label="Close navigation">×</button>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="mode-switch" role="group" aria-label="Display mode">
          <button type="button" class="mode-btn" data-mode="simple">Simple</button>
          <button type="button" class="mode-btn" data-mode="designer">Designer</button>
        </div>
        <p class="mode-hint" id="mode-hint">Colours, fonts &amp; logos for everyday use</p>
      </div>
    </aside>

    <div class="sidebar-backdrop" id="sidebar-backdrop" hidden></div>

    <div class="content">
      <header>
        <div class="header-top">
          <div class="header-left">
            <button type="button" class="menu-toggle" id="menu-toggle" aria-label="Open navigation">
              <span></span><span></span><span></span>
            </button>
            <div>
              <h1>Brand guide</h1>
              <p class="subtitle">Colours, typography and logos for ZIP and sub-brands</p>
            </div>
          </div>
          <div class="profile-toggle designer-only" role="group" aria-label="CMYK profile">
            <button type="button" class="profile-btn" data-profile="swop">SWOP v2</button>
            <button type="button" class="profile-btn" data-profile="fogra39">FOGRA39</button>
          </div>
        </div>
      </header>

      <main id="brands-container">
        <p class="loading">Loading…</p>
      </main>
    </div>
  </div>

  <!-- Add colour modal -->
  <dialog id="color-modal">
    <form id="color-form" method="dialog">
      <h2 id="modal-title">Add colour</h2>
      <div class="field">
        <label for="color-name">Name</label>
        <input type="text" id="color-name" placeholder="e.g. Primary" required autocomplete="off">
      </div>
      <div class="field color-field">
        <label for="color-hex">Hex</label>
        <div class="color-input-group">
          <input type="color" id="color-picker" aria-label="Colour picker">
          <input type="text" id="color-hex" placeholder="#000000" pattern="^#[0-9a-fA-F]{6}$" required autocomplete="off">
        </div>
      </div>
      <div class="field">
        <label>CMYK <span class="field-optional">— optional, enter values from brand guidelines</span></label>
        <div class="cmyk-input-group">
          <div class="cmyk-channel">
            <label for="cmyk-c">C</label>
            <input type="number" id="cmyk-c" min="0" max="100" step="1" placeholder="—" autocomplete="off">
          </div>
          <div class="cmyk-channel">
            <label for="cmyk-m">M</label>
            <input type="number" id="cmyk-m" min="0" max="100" step="1" placeholder="—" autocomplete="off">
          </div>
          <div class="cmyk-channel">
            <label for="cmyk-y">Y</label>
            <input type="number" id="cmyk-y" min="0" max="100" step="1" placeholder="—" autocomplete="off">
          </div>
          <div class="cmyk-channel">
            <label for="cmyk-k">K</label>
            <input type="number" id="cmyk-k" min="0" max="100" step="1" placeholder="—" autocomplete="off">
          </div>
        </div>
        <p class="cmyk-hint" id="cmyk-hint"></p>
      </div>
      <div class="modal-actions">
        <button type="button" id="modal-cancel" class="btn-ghost">Cancel</button>
        <button type="submit" id="modal-submit" class="btn-primary">Add colour</button>
      </div>
    </form>
  </dialog>

  <script src="vendor/jsColorEngineWeb.js"></script>
  <script src="main.js"></script>
</body>
</html>
